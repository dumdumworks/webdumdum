# ───────────────────────────────────────────────────────────
# Configuracion de Sveltia CMS para DUM DUM
# Edita menu.json (la carta) y galerias.json (imagenes de eventos).
# ───────────────────────────────────────────────────────────
backend:
  name: github
  repo: dumdumworks/webdumdum
  branch: main

media_folder: "img/dumplings"
public_folder: "img/dumplings"

collections:
  - name: "galeria-imagenes"
    label: "Contenido de la web"
    files:
      - name: "carta"
        label: "Carta"
        file: "menu.json"
        fields:
          - { name: "updated", label: "Texto 'ultima actualizacion'", widget: "string", required: false }
          - name: "sections"
            label: "Secciones"
            widget: "list"
            label_singular: "Seccion"
            summary: "{{fields.title}}"
            fields:
              - { name: "id", label: "ID interno", widget: "string", hint: "No usar espacios ni acentos. Ej: dumplings" }
              - { name: "title", label: "Titulo de la seccion", widget: "string" }
              - { name: "title_en", label: "Titulo de la seccion (EN)", widget: "string", required: false, hint: "Version en ingles. Si lo dejas vacio, se muestra el espanol." }
              - { name: "note", label: "Nota bajo el titulo", widget: "string", required: false }
              - { name: "note_en", label: "Nota bajo el titulo (EN)", widget: "string", required: false, hint: "Version en ingles. Si lo dejas vacio, se muestra el espanol." }
              - name: "items"
                label: "Platos"
                widget: "list"
                label_singular: "Plato"
                summary: "{{fields.name}} - {{fields.price}} EUR"
                fields:
                  - { name: "id", label: "ID interno", widget: "string", hint: "Sin espacios ni acentos. Ej: muaythai" }
                  - { name: "n", label: "Numero", widget: "number", value_type: "int", default: 0 }
                  - { name: "name", label: "Nombre del plato", widget: "string" }
                  - { name: "name_en", label: "Nombre del plato (EN)", widget: "string", required: false, hint: "Version en ingles. Si lo dejas vacio, se muestra el espanol." }
                  - { name: "tagline", label: "Tagline (mayusculas)", widget: "string", required: false }
                  - { name: "tagline_en", label: "Tagline (EN)", widget: "string", required: false, hint: "Version en ingles. Si lo dejas vacio, se muestra el espanol." }
                  - { name: "ingredients", label: "Ingredientes", widget: "text", required: false }
                  - { name: "ingredients_en", label: "Ingredientes (EN)", widget: "text", required: false, hint: "Version en ingles. Si lo dejas vacio, se muestra el espanol." }
                  - { name: "price", label: "Precio (sin EUR, ej: 9,50)", widget: "string" }
                  - name: "tags"
                    label: "Etiquetas"
                    widget: "select"
                    multiple: true
                    required: false
                    hint: "Marca las que apliquen. PICANTE sale como HOT, VEG sale con la hojita."
                    options:
                      - { label: "Picante (HOT)", value: "PICANTE" }
                      - { label: "Vegetariano (VEG)", value: "VEG" }
                      - { label: "Nuevo (NEW)", value: "NEW" }
                      - { label: "Por tiempo limitado", value: "POR TIEMPO LIMITADO" }
                  - { name: "available", label: "Plato disponible (desmarca para ocultarlo de la web)", widget: "boolean", required: false, default: true }
                  - { name: "featured", label: "Plato destacado", widget: "boolean", required: false, default: false }
                  - { name: "image", label: "Foto del plato", widget: "image", required: false }
                  - { name: "logo", label: "Logo (avanzado, dejar vacio)", widget: "string", required: false }

      - name: "textos-eventos"
        label: "Eventos · Textos"
        file: "eventos.json"
        fields:
          # PÁRRAFOS: editor con botón de NEGRITA. Escribe libre; para resaltar
          # una palabra, selecciónala y pulsa el botón de negrita (B).
          # TÍTULOS: campo "negro" (texto principal) + campo "rojo" (la parte
          # que sale en rojo). El color y los saltos los pone la web sola.
          # Para cada texto hay versión ES y versión EN (si dejas EN vacío,
          # se muestra el español).

          # ── Hero ──
          - { name: "hero_title", label: "Hero · título", widget: "string", required: false }
          - { name: "hero_title_en", label: "Hero · título (EN)", widget: "string", required: false }
          - { name: "hero_body", label: "Hero · párrafo", widget: "markdown", required: false, buttons: ["bold"], editor_components: [], minimal: true }
          - { name: "hero_body_en", label: "Hero · párrafo (EN)", widget: "markdown", required: false, buttons: ["bold"], editor_components: [], minimal: true }

          # ── Espacio ──
          - { name: "espacio_title", label: "Espacio · título", widget: "string", required: false, hint: "Usa ' / ' para separar en varias líneas." }
          - { name: "espacio_title_en", label: "Espacio · título (EN)", widget: "string", required: false, hint: "Usa ' / ' para separar en varias líneas." }
          - { name: "espacio_body", label: "Espacio · párrafo", widget: "markdown", required: false, buttons: ["bold"], editor_components: [], minimal: true }
          - { name: "espacio_body_en", label: "Espacio · párrafo (EN)", widget: "markdown", required: false, buttons: ["bold"], editor_components: [], minimal: true }

          # ── Producto ──
          - { name: "producto_title", label: "Producto · título", widget: "string", required: false, hint: "Usa ' / ' para separar en varias líneas." }
          - { name: "producto_title_en", label: "Producto · título (EN)", widget: "string", required: false, hint: "Usa ' / ' para separar en varias líneas." }
          - { name: "producto_body", label: "Producto · texto", widget: "markdown", required: false, buttons: ["bold"], editor_components: [], minimal: true, hint: "Escribe todo seguido. Deja una línea en blanco entre párrafos y la web los separa sola." }
          - { name: "producto_body_en", label: "Producto · texto (EN)", widget: "markdown", required: false, buttons: ["bold"], editor_components: [], minimal: true }

          # ── Prensa ──
          - { name: "prensa_title", label: "Prensa · título", widget: "string", required: false }
          - { name: "prensa_title_en", label: "Prensa · título (EN)", widget: "string", required: false }
          - { name: "prensa_body", label: "Prensa · párrafo", widget: "markdown", required: false, buttons: ["bold"], editor_components: [], minimal: true }
          - { name: "prensa_body_en", label: "Prensa · párrafo (EN)", widget: "markdown", required: false, buttons: ["bold"], editor_components: [], minimal: true }

          # ── Redes ──
          - { name: "redes_title", label: "Redes · título", widget: "string", required: false }
          - { name: "redes_title_en", label: "Redes · título (EN)", widget: "string", required: false }
          - { name: "redes_body", label: "Redes · párrafo", widget: "markdown", required: false, buttons: ["bold"], editor_components: [], minimal: true }
          - { name: "redes_body_en", label: "Redes · párrafo (EN)", widget: "markdown", required: false, buttons: ["bold"], editor_components: [], minimal: true }

          # ── Universo ──
          - { name: "universo_title", label: "Universo · título", widget: "string", required: false, hint: "Usa ' / ' para separar en varias líneas." }
          - { name: "universo_title_en", label: "Universo · título (EN)", widget: "string", required: false, hint: "Usa ' / ' para separar en varias líneas." }
          - { name: "universo_body", label: "Universo · párrafo", widget: "markdown", required: false, buttons: ["bold"], editor_components: [], minimal: true }
          - { name: "universo_body_en", label: "Universo · párrafo (EN)", widget: "markdown", required: false, buttons: ["bold"], editor_components: [], minimal: true }

          # ── Al frente (Kéril & Yerai) ──
          - { name: "frente_subtitle", label: "Al frente · subtítulo", widget: "string", required: false }
          - { name: "frente_subtitle_en", label: "Al frente · subtítulo (EN)", widget: "string", required: false }
          - { name: "frente_body", label: "Al frente · texto", widget: "markdown", required: false, buttons: ["bold"], editor_components: [], minimal: true, hint: "Escribe todo seguido. Deja una línea en blanco entre párrafos y la web los separa sola." }
          - { name: "frente_body_en", label: "Al frente · texto (EN)", widget: "markdown", required: false, buttons: ["bold"], editor_components: [], minimal: true }

          # ── Contacto (título del formulario) ──
          - { name: "contacto_title", label: "Contacto · título", widget: "string", required: false }
          - { name: "contacto_title_en", label: "Contacto · título (EN)", widget: "string", required: false }

      - name: "imagenes-eventos"
        label: "Eventos · Imágenes"
        file: "galerias.json"
        fields:
          - name: "espacio"
            label: "Galería · Espacio"
            widget: "list"
            label_singular: "Foto"
            summary: "{{fields.src}}"
            required: false
            fields:
              - { name: "src", label: "Foto", widget: "image", required: false, media_folder: "/img/espacio", public_folder: "img/espacio" }
              - { name: "pos", label: "Encuadre (avanzado, dejar 50% 50%)", widget: "string", required: false, default: "50% 50%" }
          - name: "producto"
            label: "Galería · Producto"
            widget: "list"
            label_singular: "Foto"
            summary: "{{fields.src}}"
            required: false
            fields:
              - { name: "src", label: "Foto", widget: "image", required: false, media_folder: "/img/dumplings", public_folder: "img/dumplings" }
              - { name: "pos", label: "Encuadre (avanzado, dejar 50% 50%)", widget: "string", required: false, default: "50% 50%" }
          - name: "prensa"
            label: "Galería · Prensa / Noticias"
            widget: "list"
            label_singular: "Noticia"
            summary: "{{fields.src}}"
            required: false
            fields:
              - { name: "src", label: "Foto de la noticia", widget: "image", required: false, media_folder: "/img/prensa", public_folder: "img/prensa" }
              - { name: "url", label: "Enlace a la noticia (https://...)", widget: "string", required: false, hint: "Al pulsar 'Ver noticia' se abre este enlace en otra pestana." }
              - { name: "pos", label: "Encuadre (avanzado, dejar 50% 50%)", widget: "string", required: false, default: "50% 50%" }
          - name: "redes"
            label: "Galería · Instagram (Reels)"
            widget: "list"
            label_singular: "Reel"
            summary: "{{fields.url}}"
            required: false
            fields:
              - { name: "url", label: "Enlace del Reel/Post de Instagram", widget: "string", required: false, hint: "Pega la URL completa, ej: https://www.instagram.com/reel/XXXX/" }
          - name: "universo"
            label: "Galería · Universo (YouTube)"
            widget: "list"
            label_singular: "Video"
            summary: "{{fields.youtube}}"
            required: false
            fields:
              - { name: "youtube", label: "Enlace de YouTube", widget: "string", required: false, hint: "Pega la URL del video, ej: https://www.youtube.com/watch?v=XXXX o https://youtu.be/XXXX" }
