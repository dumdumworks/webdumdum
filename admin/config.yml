# ───────────────────────────────────────────────────────────
# Configuracion de Sveltia CMS para DUM DUM
# Edita menu.json (la carta) y galerias.json (imagenes de eventos).
# ───────────────────────────────────────────────────────────
backend:
  name: github
  repo: dumdumworks/webdumdum
  branch: main

media_folder: "img/dumplings"
public_folder: "img/dumplings"

collections:
  - name: "galeria-imagenes"
    label: "Galería de Imágenes"
    files:
      - name: "carta"
        label: "Carta"
        file: "menu.json"
        fields:
          - { name: "updated", label: "Texto 'ultima actualizacion'", widget: "string", required: false }
          - name: "sections"
            label: "Secciones"
            widget: "list"
            label_singular: "Seccion"
            summary: "{{fields.title}}"
            fields:
              - { name: "id", label: "ID interno", widget: "string", hint: "No usar espacios ni acentos. Ej: dumplings" }
              - { name: "title", label: "Titulo de la seccion", widget: "string" }
              - { name: "title_en", label: "Titulo de la seccion (EN)", widget: "string", required: false, hint: "Version en ingles. Si lo dejas vacio, se muestra el espanol." }
              - { name: "note", label: "Nota bajo el titulo", widget: "string", required: false }
              - { name: "note_en", label: "Nota bajo el titulo (EN)", widget: "string", required: false, hint: "Version en ingles. Si lo dejas vacio, se muestra el espanol." }
              - name: "items"
                label: "Platos"
                widget: "list"
                label_singular: "Plato"
                summary: "{{fields.name}} - {{fields.price}} EUR"
                fields:
                  - { name: "id", label: "ID interno", widget: "string", hint: "Sin espacios ni acentos. Ej: muaythai" }
                  - { name: "n", label: "Numero", widget: "number", value_type: "int", default: 0 }
                  - { name: "name", label: "Nombre del plato", widget: "string" }
                  - { name: "name_en", label: "Nombre del plato (EN)", widget: "string", required: false, hint: "Version en ingles. Si lo dejas vacio, se muestra el espanol." }
                  - { name: "tagline", label: "Tagline (mayusculas)", widget: "string", required: false }
                  - { name: "tagline_en", label: "Tagline (EN)", widget: "string", required: false, hint: "Version en ingles. Si lo dejas vacio, se muestra el espanol." }
                  - { name: "ingredients", label: "Ingredientes", widget: "text", required: false }
                  - { name: "ingredients_en", label: "Ingredientes (EN)", widget: "text", required: false, hint: "Version en ingles. Si lo dejas vacio, se muestra el espanol." }
                  - { name: "price", label: "Precio (sin EUR, ej: 9,50)", widget: "string" }
                  - name: "tags"
                    label: "Etiquetas"
                    widget: "select"
                    multiple: true
                    required: false
                    hint: "Marca las que apliquen. PICANTE sale como HOT, VEG sale con la hojita."
                    options:
                      - { label: "Picante (HOT)", value: "PICANTE" }
                      - { label: "Vegetariano (VEG)", value: "VEG" }
                      - { label: "Nuevo (NEW)", value: "NEW" }
                      - { label: "Por tiempo limitado", value: "POR TIEMPO LIMITADO" }
                  - { name: "available", label: "Plato disponible (desmarca para ocultarlo de la web)", widget: "boolean", required: false, default: true }
                  - { name: "featured", label: "Plato destacado", widget: "boolean", required: false, default: false }
                  - { name: "image", label: "Foto del plato", widget: "image", required: false }
                  - { name: "logo", label: "Logo (avanzado, dejar vacio)", widget: "string", required: false }

      - name: "imagenes-eventos"
        label: "Imágenes de Eventos"
        file: "galerias.json"
        fields:
          - name: "espacio"
            label: "Galería · Espacio"
            widget: "list"
            label_singular: "Foto"
            summary: "{{fields.src}}"
            required: false
            fields:
              - { name: "src", label: "Foto", widget: "image", required: false, media_folder: "/img/espacio", public_folder: "img/espacio" }
              - { name: "pos", label: "Encuadre (avanzado, dejar 50% 50%)", widget: "string", required: false, default: "50% 50%" }
          - name: "producto"
            label: "Galería · Producto"
            widget: "list"
            label_singular: "Foto"
            summary: "{{fields.src}}"
            required: false
            fields:
              - { name: "src", label: "Foto", widget: "image", required: false, media_folder: "/img/dumplings", public_folder: "img/dumplings" }
              - { name: "pos", label: "Encuadre (avanzado, dejar 50% 50%)", widget: "string", required: false, default: "50% 50%" }
          - name: "prensa"
            label: "Galería · Prensa / Noticias"
            widget: "list"
            label_singular: "Noticia"
            summary: "{{fields.src}}"
            required: false
            fields:
              - { name: "src", label: "Foto de la noticia", widget: "image", required: false, media_folder: "/img/prensa", public_folder: "img/prensa" }
              - { name: "url", label: "Enlace a la noticia (https://...)", widget: "string", required: false, hint: "Al pulsar 'Ver noticia' se abre este enlace en otra pestana." }
              - { name: "pos", label: "Encuadre (avanzado, dejar 50% 50%)", widget: "string", required: false, default: "50% 50%" }
          - name: "redes"
            label: "Galería · Instagram (Reels)"
            widget: "list"
            label_singular: "Reel"
            summary: "{{fields.url}}"
            required: false
            fields:
              - { name: "url", label: "Enlace del Reel/Post de Instagram", widget: "string", required: false, hint: "Pega la URL completa, ej: https://www.instagram.com/reel/XXXX/" }
          - name: "universo"
            label: "Galería · Universo (YouTube)"
            widget: "list"
            label_singular: "Video"
            summary: "{{fields.youtube}}"
            required: false
            fields:
              - { name: "youtube", label: "Enlace de YouTube", widget: "string", required: false, hint: "Pega la URL del video, ej: https://www.youtube.com/watch?v=XXXX o https://youtu.be/XXXX" }
