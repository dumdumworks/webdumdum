  <!-- Paso 1: cargar el menu publicado (menu.json) ANTES de arrancar.
       Si no existe o falla, la web usa el menu de respaldo de data.jsx. -->
  <script>
    window.__bootDumDum = function () {
      var files = ["src/data.jsx", "src/ui.jsx", "src/pages.jsx", "src/admin.jsx", "src/app.jsx"];
      var ASSET_VER = "20260528u";
      files.forEach(function (src) {
        var s = document.createElement("script");
        s.type = "text/babel";
        s.setAttribute("data-presets", "react");
        s.src = src + "?v=" + ASSET_VER;
        document.body.appendChild(s);
      });
      // Pedir a Babel que compile los scripts type=text/babel ya presentes.
      if (window.Babel && window.Babel.transformScriptTags) {
        window.Babel.transformScriptTags();
      }
    };

    fetch("menu.json?ts=" + Date.now())
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (data) { if (data && data.sections) { window.PUBLISHED_MENU = data; } })
      .catch(function () {})
      .then(function () {
        // Cargar tambien las galerias (archivo aparte, editable en Sveltia).
        return fetch("galerias.json?ts=" + Date.now())
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(function (g) { if (g) { window.PUBLISHED_GALLERY = g; } })
          .catch(function () {});
      })
      .then(function () {
        // Cargar los textos de la seccion Eventos (editables en Sveltia).
        // Si falta o falla, la web usa los textos de respaldo del codigo.
        return fetch("eventos.json?ts=" + Date.now())
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(function (e) { if (e) { window.PUBLISHED_EVENTOS = e; } })
          .catch(function () {});
      })
      .then(function () { window.__bootDumDum(); });
  </script>
