<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>DUM DUM&#8482; &#8212; Dumplings &amp; Desobediencia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://use.typekit.net/avd6wfq.css">
  <link rel="stylesheet" href="src/styles.css" />
  <script src="image-slot.js"></script>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Paso 1: cargar el menu publicado (menu.json) ANTES de arrancar.
       Si no existe o falla, la web usa el menu de respaldo de data.jsx. -->
  <script>
    window.__bootDumDum = function () {
      var files = ["src/data.jsx", "src/ui.jsx", "src/pages.jsx", "src/admin.jsx", "src/app.jsx"];
      files.forEach(function (src) {
        var s = document.createElement("script");
        s.type = "text/babel";
        s.setAttribute("data-presets", "react");
        s.src = src;
        document.body.appendChild(s);
      });
      // Pedir a Babel que compile los scripts type=text/babel ya presentes.
      if (window.Babel && window.Babel.transformScriptTags) {
        window.Babel.transformScriptTags();
      }
    };

    fetch("menu.json?ts=" + Date.now())
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (data) { if (data && data.sections) { window.PUBLISHED_MENU = data; } })
      .catch(function () {})
      .then(function () {
        // Cargar tambien las galerias (archivo aparte, editable en Sveltia).
        return fetch("galerias.json?ts=" + Date.now())
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(function (g) { if (g) { window.PUBLISHED_GALLERY = g; } })
          .catch(function () {});
      })
      .then(function () { window.__bootDumDum(); });
  </script>
</body>
</html>
