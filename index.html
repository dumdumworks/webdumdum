  <!-- SEO inmediato por página: fija title/description/canonical según la URL
       AL INSTANTE, sin esperar a React ni a las descargas de los .json. Así un
       rastreador que capture la página en el primer momento ya ve el título
       correcto de cada sección (no el genérico de la home). app.jsx vuelve a
       aplicar esto mismo al arrancar; aquí solo lo adelantamos. -->
  <script>
    (function () {
      try {
        var ORIGIN = "https://dum-dum.es";
        var ROUTES = [
          { p: "/menu",     t: "DUM DUM\u2122 — La carta",
            d: "La carta de DUM DUM: dumplings que rompen las normas. Cheese Burger, Carbonara, Gamba K-Pop y más." },
          { p: "/locales",  t: "DUM DUM\u2122 — Locales",
            d: "Nuestros dos locales en Madrid: Chamberí (Blasco de Garay, 10) y Bernabéu (Infanta Mercedes, 17)." },
          { p: "/eventos",  t: "DUM DUM\u2122 — Eventos",
            d: "Un espacio con identidad para tu evento en Madrid. 55 m², cocina abierta, hasta 35 personas." },
          { p: "/contacto", t: "DUM DUM\u2122 — Contacto",
            d: "Contacta con DUM DUM. Reservas, eventos y consultas." }
        ];
        var path = window.location.pathname || "/";
        // Normaliza barra final (salvo la home).
        if (path.length > 1 && path.charAt(path.length - 1) === "/") path = path.slice(0, -1);
        var match = null;
        for (var i = 0; i < ROUTES.length; i++) {
          var r = ROUTES[i];
          if (path === r.p || path.indexOf(r.p + "/") === 0 || path.indexOf(r.p + "_") === 0) { match = r; break; }
        }
        if (match) {
          document.title = match.t;
          var canon = ORIGIN + match.p;
          var setMeta = function (sel, attr, val) {
            var el = document.querySelector(sel);
            if (el) el.setAttribute(attr, val);
          };
          setMeta('meta[name="description"]', "content", match.d);
          setMeta('link[rel="canonical"]', "href", canon);
          setMeta('meta[property="og:title"]', "content", match.t);
          setMeta('meta[property="og:description"]', "content", match.d);
          setMeta('meta[property="og:url"]', "content", canon);
          setMeta('meta[name="twitter:title"]', "content", match.t);
          setMeta('meta[name="twitter:description"]', "content", match.d);
        }
      } catch (e) {}
    })();
  </script>

  <!-- Paso 1: cargar el menu publicado (menu.json) ANTES de arrancar.
       Si no existe o falla, la web usa el menu de respaldo de data.jsx. -->
  <script>
    window.__bootDumDum = function () {
      var files = ["src/data.jsx", "src/ui.jsx", "src/pages.jsx", "src/admin.jsx", "src/app.jsx"];
      var ASSET_VER = "20260616a";
      files.forEach(function (src) {
        var s = document.createElement("script");
        s.type = "text/babel";
        s.setAttribute("data-presets", "react");
        s.src = src + "?v=" + ASSET_VER;
        document.body.appendChild(s);
      });
      // Pedir a Babel que compile los scripts type=text/babel ya presentes.
      if (window.Babel && window.Babel.transformScriptTags) {
        window.Babel.transformScriptTags();
      }
    };

    fetch("menu.json?ts=" + Date.now())
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (data) { if (data && data.sections) { window.PUBLISHED_MENU = data; } })
      .catch(function () {})
      .then(function () {
        // Cargar tambien las galerias (archivo aparte, editable en Sveltia).
        return fetch("galerias.json?ts=" + Date.now())
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(function (g) { if (g) { window.PUBLISHED_GALLERY = g; } })
          .catch(function () {});
      })
      .then(function () {
        // Cargar los textos de la seccion Eventos (editables en Sveltia).
        // Si falta o falla, la web usa los textos de respaldo del codigo.
        return fetch("eventos.json?ts=" + Date.now())
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(function (e) { if (e) { window.PUBLISHED_EVENTOS = e; } })
          .catch(function () {});
      })
      .then(function () { window.__bootDumDum(); });
  </script>

  <!-- Disparador por URL: si alguien entra con ?reservar (p.ej. desde el anuncio),
       se abre la ventana de reserva sola, como si hubiera pulsado el boton.
       No toca el sistema de reservas: solo lanza la misma senal que los botones. -->
  <script>
    (function () {
      try {
        var params = new URLSearchParams(window.location.search);
        if (!params.has("reservar")) return;
        var tries = 0;
        var iv = setInterval(function () {
          tries++;
          var root = document.getElementById("root");
          if (root && root.children.length > 0) {
            clearInterval(iv);
            // La web ya ha cargado; esperamos un instante y abrimos la reserva.
            setTimeout(function () {
              window.dispatchEvent(new Event("dumdum:open-reserve"));
            }, 600);
          } else if (tries > 100) {
            clearInterval(iv); // seguridad: ~20s y paramos
          }
        }, 200);
      } catch (e) {}
    })();
  </script>
